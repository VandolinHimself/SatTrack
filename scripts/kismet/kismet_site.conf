# SatTrack — drop-in site config for Kismet + RTL-SDR ADS-B.
# Installed to /etc/kismet/kismet_site.conf by install.sh
#
# SatTrack's web dashboard polls http://127.0.0.1:2501 for live aircraft.
# When sdr_sharing is enabled, SatTrack stops this service during satellite passes.

# Allow the local SatTrack dashboard/API client without a login token.
allow_httpd_localhost=true

# Bind the web UI / REST API on all interfaces (LAN dashboard optional).
http_data=http://0.0.0.0:2501/

# RTL-SDR ADS-B (1090 MHz). Shares the dongle with SatTrack via systemd handoff.
source=rtladsb-0,rtl_adsb,add_default=true
