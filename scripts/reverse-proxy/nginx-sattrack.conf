# Optional nginx vhost if you terminate TLS on lucius instead of Cloudflare Tunnel.
# Requires certbot / existing wildcard cert for *.luciuswayne.com

server {
    listen 443 ssl http2;
    server_name sattracker.luciuswayne.com;

    # ssl_certificate     /etc/letsencrypt/live/luciuswayne.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/luciuswayne.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
